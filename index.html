const C = {

  green:'#0F8A4F', greenBg:'#E6F4EC',

const abbr = v => {
  if (v == null || isNaN(v)) return '—';
  const a = Math.abs(v);
  if (a >= 1e9) return `$${(v/1e9).toFixed(1)}B`;
  if (a >= 1e6) return `$${(v/1e6).toFixed(1)}M`;
  if (a >= 1e3) return `$${(v/1e3).toFixed(0)}K`;
  return `$${v.toFixed(0)}`;
};
const pctFmt = v => {
  if (v == null || isNaN(v)) return '—';
  return `${v >= 0 ? '+' : ''}${v.toFixed(1)}%`;
};

    book: "M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2zM22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z",

const Delta = ({ v }) => {
  if (v == null || isNaN(v)) return null;
  const up = v >= 0;
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:3, background:up?C.greenBg:C.redBg, color:up?C.green:C.red, padding:'2px 7px', borderRadius:999, fontSize:11, fontWeight:600, lineHeight:1.5 }}>
      {up ? <UpArr/> : <DnArr/>} {pctFmt(v)}
    </span>
  );
};

async function readWorksheetValue(dashboard, wsName) {
  try {
    const ws = dashboard.worksheets.find(w => w.name === wsName);
    if (!ws) { console.warn(`Worksheet not found: ${wsName}`); return null; }
    const dt = await ws.getSummaryDataAsync();
    const cols = dt.columns.map(c => c.fieldName);
    const rows = dt.data;
    if (!rows.length) return null;
    const result = [];
    rows[0].forEach((cell, i) => {
      const v = cell.nativeValue != null ? parseFloat(cell.nativeValue) : parseFloat(cell.value);
      result.push({ name: cols[i], value: isNaN(v) ? null : v, formatted: cell.formattedValue });
    });
    return result;
  } catch (e) {
    console.warn(`Failed to read ${wsName}:`, e);
    return null;
  }
}

const LoadingScreen = () => (
  <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100vh', flexDirection:'column', gap:12 }}>
    <div style={{ fontSize:16, fontWeight:600, color:C.navy }}>Loading dashboard data...</div>
    <div style={{ fontSize:12, color:C.fg4 }}>Reading from Tableau worksheets</div>
  </div>
);

const App = () => {
  const [route, setRoute] = useState('overview');
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const loadData = useCallback(async () => {
    try {
      // Fetch live data from data.json (updated by refresh script)
      const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
      const resp = await fetch(baseUrl + '/data.json?t=' + Date.now());
      if (resp.ok) {
        const liveData = await resp.json();
        console.log('Live data loaded from data.json, last updated:', liveData.lastUpdated);
        setData(liveData);
        setLoading(false);
        return;
      }
      console.log('data.json not available, using demo data');
      setData(getDemoData());
      setLoading(false);
    } catch (e) {
      console.error('Init error:', e);
      setError(e.message);
      setData(getDemoData());
      setLoading(false);
    }
  }, []);

  useEffect(() => { loadData(); }, [loadData]);

  const nav = NAV.find(n => n.id === route);

  if (loading) return <LoadingScreen/>;

  const SCREENS = {
    'overview': <OverviewScreen data={data} go={setRoute}/>,
  };

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden', fontFamily:"'Inter',system-ui,sans-serif" }}>
      <Sidebar active={route} go={setRoute}/>
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <Topbar title={nav?.label || ''}/>
        {error && <div style={{padding:'4px 22px',fontSize:11,color:C.fg4,background:C.bgSub}}>Using demo data — extension not connected to Tableau worksheet</div>}
        <div style={{ flex:1, overflowY:'auto', overflowX:'hidden', background:C.bgSub }}>
          {SCREENS[route] || <Placeholder title={nav?.label}/>}
        </div>
      </div>
    </div>
  );
};

function mapTableauData(r) {
  const val = (arr, idx) => arr && arr[idx] ? arr[idx].value : null;
  const fmt = (arr, idx) => arr && arr[idx] ? arr[idx].formatted : null;
  const pct = (main, diff) => (main && diff && main !== 0) ? (diff / main) * 100 : null;

  const syV = val(r.salesYtd, 0), syD = val(r.salesYtd, 1);
  const smV = val(r.salesMtd, 0), smD = val(r.salesMtd, 1);
  const wsyV = val(r.wsYtd, 0), wsyD = val(r.wsYtd, 1);
  const wsmV = val(r.wsMtd, 0), wsmD = val(r.wsMtd, 1);
  const qsyV = val(r.qwsYtd, 0), qsyD = val(r.qwsYtd, 1);
  const qsmV = val(r.qwsMtd, 0), qsmD = val(r.qwsMtd, 1);
  const spyV = val(r.supplyYtd, 0), spyD = val(r.supplyYtd, 1);
  const spmV = val(r.supplyMtd, 0);
  const sprV = val(r.supplyRcvd, 0), sprD = val(r.supplyRcvd, 1);
  const iyV = val(r.invYtd, 0), iyD = val(r.invYtd, 1);
  const imV = val(r.invMtd, 0), imD = val(r.invMtd, 1);
  const icyV = val(r.invCadYtd, 0), icyD = val(r.invCadYtd, 1);
  const icmV = val(r.invCadMtd, 0), icmD = val(r.invCadMtd, 1);

  return {
    salesYtdVal: syV, salesYtdDiff: syD, salesYtdPct: syD && syV ? (syD / (syV - syD)) * 100 : null,
    salesMtdVal: smV, salesMtdDiff: smD, salesMtdPct: smD && smV ? (smD / (smV - smD)) * 100 : null,
    wsYtdVal: wsyV, wsYtdDiff: wsyD, wsYtdPct: wsyD && wsyV ? (wsyD / (wsyV - wsyD)) * 100 : null,
    wsMtdVal: wsmV, wsMtdDiff: wsmD, wsMtdPct: wsmD && wsmV ? (wsmD / (wsmV - wsmD)) * 100 : null,
    qwsYtdVal: qsyV, qwsYtdDiff: qsyD, qwsYtdPct: qsyD && qsyV ? (qsyD / (qsyV - qsyD)) * 100 : null,
    qwsMtdVal: qsmV, qwsMtdDiff: qsmD, qwsMtdPct: qsmD && qsmV ? (qsmD / (qsmV - qsmD)) * 100 : null,
    orderbookVal: val(r.orderbook, 0),
    orderbookProjectVal: val(r.orderbookChannel, 0),
    orderbookProjectPct: fmt(r.orderbookChannel, 1),
    orderbookOutletVal: val(r.orderbookOutlet, 0),
    orderbookOutletPct: fmt(r.orderbookOutlet, 1),
    orderbookUpgradeVal: val(r.orderbookUpgrade, 0),
    orderbookUpgradePct: fmt(r.orderbookUpgrade, 1),
    supplyYtdVal: spyV, supplyYtdDiff: spyD, supplyYtdPct: spyD && spyV ? (spyD / (spyV - spyD)) * 100 : null,
    supplyMtdVal: spmV,
    supplyRcvdVal: sprV, supplyRcvdDiff: sprD, supplyRcvdPct: sprD && sprV ? (sprD / (sprV - sprD)) * 100 : null,
    invYtdVal: iyV, invYtdDiff: iyD, invYtdPct: iyD && iyV ? (iyD / (iyV - iyD)) * 100 : null,
    invMtdVal: imV, invMtdDiff: imD, invMtdPct: imD && imV ? (imD / (imV - imD)) * 100 : null,
    invCadYtdVal: icyV, invCadYtdDiff: icyD, invCadYtdPct: icyD && icyV ? (icyD / (icyV - icyD)) * 100 : null,
    invCadMtdVal: icmV, invCadMtdDiff: icmD, invCadMtdPct: icmD && icmV ? (icmD / (icmV - icmD)) * 100 : null,
    excessNewVal: val(r.excessNew, 0), excessNewQty: fmt(r.excessNew, 1),
    excessOutletVal: val(r.excessOutlet, 0), excessOutletQty: fmt(r.excessOutlet, 1),
  };
}

function getDemoData() {
  return {
